<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- 数据库图标 -->
  <symbol id="icon-database" viewBox="0 0 24 24">
    <path d="M12 2C6.48 2 2 4.24 2 7v10c0 2.76 4.48 5 10 5s10-2.24 10-5V7c0-2.76-4.48-5-10-5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="12" cy="7" rx="10" ry="3" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M2 12c0 2.76 4.48 5 10 5s10-2.24 10-5" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- 搜索图标 -->
  <symbol id="icon-search" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 文档图标 -->
  <symbol id="icon-document" viewBox="0 0 24 24">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <line x1="12" y1="13" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="15" x2="14" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 文件夹图标 -->
  <symbol id="icon-folder" viewBox="0 0 24 24">
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  </symbol>

  <!-- 设置图标 -->
  <symbol id="icon-settings" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-15.78 7.78l4.24-4.24m3.08-3.08l4.24-4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 帮助图标 -->
  <symbol id="icon-help" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M12 17v.01M12 13a2 2 0 0 0-2-2 2 2 0 0 0-2 2c0 1 1 2 2 2s2 1 2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 暂停图标 -->
  <symbol id="icon-pause" viewBox="0 0 24 24">
    <rect x="6" y="4" width="4" height="16" fill="currentColor"/>
    <rect x="14" y="4" width="4" height="16" fill="currentColor"/>
  </symbol>

  <!-- 播放图标 -->
  <symbol id="icon-play" viewBox="0 0 24 24">
    <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>
  </symbol>

  <!-- 刷新图标 -->
  <symbol id="icon-refresh" viewBox="0 0 24 24">
    <polyline points="23 4 23 10 17 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20.49 15a9 9 0 1 1-2-8.83" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 警告图标 -->
  <symbol id="icon-warning" viewBox="0 0 24 24">
    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3.05h16.94a2 2 0 0 0 1.71-3.05L13.71 3.86a2 2 0 0 0-3.42 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 成功图标 -->
  <symbol id="icon-success" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <polyline points="16 12 12 8 8 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 错误图标 -->
  <symbol id="icon-error" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 文件图标 -->
  <symbol id="icon-file" viewBox="0 0 24 24">
    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <polyline points="13 2 13 9 20 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  </symbol>

  <!-- PDF 图标 -->
  <symbol id="icon-pdf" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <text x="12" y="16" font-size="10" font-weight="bold" text-anchor="middle" fill="currentColor">PDF</text>
  </symbol>

  <!-- Excel 图标 -->
  <symbol id="icon-excel" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <text x="12" y="16" font-size="10" font-weight="bold" text-anchor="middle" fill="currentColor">XLS</text>
  </symbol>

  <!-- Word 图标 -->
  <symbol id="icon-word" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <text x="12" y="16" font-size="10" font-weight="bold" text-anchor="middle" fill="currentColor">DOC</text>
  </symbol>

  <!-- 时钟图标 -->
  <symbol id="icon-clock" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <polyline points="12 6 12 12 16 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 右箭头图标 -->
  <symbol id="icon-chevron-right" viewBox="0 0 24 24">
    <polyline points="9 18 15 12 9 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- 更多图标 -->
  <symbol id="icon-more" viewBox="0 0 24 24">
    <circle cx="12" cy="5" r="2" fill="currentColor"/>
    <circle cx="12" cy="12" r="2" fill="currentColor"/>
    <circle cx="12" cy="19" r="2" fill="currentColor"/>
  </symbol>

  <!-- 信息图标 -->
  <symbol id="icon-info" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="12" y1="16" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="8" x2="12.01" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 图表图标 -->
  <symbol id="icon-chart" viewBox="0 0 24 24">
    <line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <polyline points="4 14 12 6 20 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>
