<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库搜索 - Knowledge Base Search</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 120px;
            background-color: #010409;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
        }

        .sidebar-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .sidebar-logo:hover {
            transform: scale(1.05);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #8b949e;
            font-size: 20px;
        }

        .nav-item:hover {
            background-color: #21262d;
            color: #58a6ff;
        }

        .nav-item.active {
            background-color: #1f6feb;
            color: white;
        }

        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 中间面板 */
        .middle-panel {
            width: 280px;
            background-color: #0d1117;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        .panel-section {
            margin-bottom: 30px;
        }

        .panel-section-title {
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-section-title .clear-btn {
            font-size: 12px;
            color: #58a6ff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            transition: color 0.2s;
        }

        .panel-section-title .clear-btn:hover {
            color: #79c0ff;
        }

        .history-item,
        .folder-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: #e6edf3;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .history-item:hover,
        .folder-item:hover {
            background-color: #21262d;
            color: #58a6ff;
        }

        .history-item .time,
        .folder-item .count {
            font-size: 12px;
            color: #8b949e;
            margin-left: auto;
        }

        .history-icon,
        .folder-icon {
            font-size: 14px;
        }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0d1117;
        }

        .top-bar {
            padding: 16px 32px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #58a6ff;
            background-color: #0d1117;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            font-size: 16px;
        }

        .search-shortcut {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #8b949e;
            background-color: #21262d;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #30363d;
        }

        .top-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .sort-btn,
        .filter-btn {
            padding: 8px 12px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #8b949e;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sort-btn:hover,
        .filter-btn:hover {
            background-color: #21262d;
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* 搜索结果区域 */
        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .results-header {
            margin-bottom: 20px;
        }

        .results-title {
            font-size: 20px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 6px;
        }

        .results-count {
            font-size: 14px;
            color: #8b949e;
        }

        .result-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .result-card:hover {
            border-color: #58a6ff;
            background-color: #0d1117;
            box-shadow: 0 0 0 1px #58a6ff;
        }

        .result-path {
            font-size: 12px;
            color: #58a6ff;
            margin-bottom: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }

        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .result-snippet {
            font-size: 13px;
            color: #c9d1d9;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .highlight {
            background-color: #ffc857;
            color: #0d1117;
            font-weight: 500;
            padding: 0 2px;
            border-radius: 2px;
        }

        .result-meta {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 12px;
            color: #8b949e;
            padding-top: 12px;
            border-top: 1px solid #30363d;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background-color: #21262d;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .pdf-badge {
            color: #f85149;
        }

        .docx-badge {
            color: #58a6ff;
        }

        .result-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: #58a6ff;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #484f58;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .middle-panel {
                width: 200px;
            }

            .results-container {
                padding: 16px 20px;
            }

            .top-bar {
                padding: 12px 20px;
            }
        }

        @media (max-width: 768px) {
            .middle-panel {
                display: none;
            }

            .sidebar {
                width: 60px;
            }

            .nav-item {
                width: 40px;
                height: 40px;
            }

            .sidebar-logo {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <div class="sidebar-logo">📚</div>
            <div class="sidebar-nav">
                <div class="nav-item active" @click="activeNav = 'search'" title="搜索">
                    🔍
                </div>
                <div class="nav-item" @click="activeNav = 'documents'" title="文档">
                    📄
                </div>
                <div class="nav-item" @click="activeNav = 'folders'" title="文件夹">
                    📁
                </div>
                <div class="nav-item" @click="activeNav = 'settings'" title="设置">
                    ⚙️
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="nav-item" title="帮助">
                    ❓
                </div>
            </div>
        </div>

        <!-- 中间面板 -->
        <div class="middle-panel">
            <!-- 最近搜索 -->
            <div class="panel-section">
                <div class="panel-section-title">
                    最近搜索
                    <button class="clear-btn">清空</button>
                </div>
                <div class="history-item" v-for="item in recentSearches" :key="item.id">
                    <span class="history-icon">🕐</span>
                    <span>{{ item.text }}</span>
                    <span class="time">{{ item.time }}</span>
                </div>
            </div>

            <!-- 快捷访问 -->
            <div class="panel-section">
                <div class="panel-section-title">快捷访问</div>
                <div class="folder-item" v-for="folder in quickAccess" :key="folder.id">
                    <span class="folder-icon">📂</span>
                    <span>{{ folder.name }}</span>
                    <span class="count">{{ folder.count }}</span>
                </div>
                <div style="text-align: center; margin-top: 12px;">
                    <button style="background: none; border: none; color: #58a6ff; cursor: pointer; font-size: 12px;">显示更多 →</button>
                </div>
            </div>
        </div>

        <!-- 右侧主内容区 -->
        <div class="main-content">
            <!-- 顶部栏 -->
            <div class="top-bar">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input 
                        type="text" 
                        class="search-box" 
                        placeholder="搜索文档、备忘录、笔记..."
                        v-model="searchQuery"
                        @keyup.enter="performSearch"
                    >
                    <span class="search-shortcut">Cmd+K</span>
                </div>
                <div class="top-controls">
                    <button class="sort-btn">
                        ↕️ 排序
                    </button>
                    <button class="filter-btn">
                        🔽 筛选
                    </button>
                </div>
            </div>

            <!-- 搜索结果 -->
            <div class="results-container">
                <div class="results-header">
                    <div class="results-title">搜索结果 "{{ searchQuery }}"</div>
                    <div class="results-count">找到 {{ results.length }} 个相关文档</div>
                </div>

                <div class="result-card" v-for="result in results" :key="result.id">
                    <div class="result-path">{{ result.path }}</div>
                    <div class="result-title">{{ result.title }}</div>
                    <div class="result-snippet" v-html="result.snippet"></div>
                    <div class="result-meta">
                        <div class="meta-item">
                            <span class="file-type-badge" :class="result.type.toLowerCase() + '-badge'">
                                📄 {{ result.type }}
                            </span>
                        </div>
                        <div class="meta-item">
                            匹配度 <strong>{{ result.match }}%</strong>
                        </div>
                        <div class="meta-item">
                            <strong>{{ result.pages }}</strong> 页
                        </div>
                        <div class="meta-item" style="margin-left: auto; color: #8b949e;">
                            更新于 {{ result.updated }}
                        </div>
                        <div class="result-actions">
                            <button class="action-btn" title="更多">⋯</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    activeNav: 'search',
                    searchQuery: '备忘录',
                    recentSearches: [
                        { id: 1, text: '备忘录', time: '2分钟前' },
                        { id: 2, text: '项目路线图', time: '1小时前' },
                        { id: 3, text: 'API 认证', time: '3小时前' },
                        { id: 4, text: 'Q2 财务报告', time: '昨天' },
                        { id: 5, text: '数据库架构', time: '2天前' }
                    ],
                    quickAccess: [
                        { id: 1, name: '产品', count: 28 },
                        { id: 2, name: '工程', count: 42 },
                        { id: 3, name: '人力资源', count: 16 },
                        { id: 4, name: '法律', count: 34 },
                        { id: 5, name: '财务', count: 22 },
                        { id: 6, name: '市场营销', count: 18 }
                    ],
                    results: [
                        {
                            id: 1,
                            path: '/Legal/Corporate Governance/2024/',
                            title: '备忘录 - ACME 与 Globex 之间的谅解备忘录',
                            snippet: '这份 <span class="highlight">备忘录</span> 是由 ACME 公司（"ACME"）和 Globex 公司（"Globex"）于 2024 年 5 月 15 日签署的，涉及潜在的战略合作...',
                            type: 'PDF',
                            match: 98,
                            pages: 24,
                            updated: '2024年5月15日'
                        },
                        {
                            id: 2,
                            path: '/Product/PRD/2024/',
                            title: '产品需求 <span class="highlight">备忘录</span> - 项目 Orion',
                            snippet: '这份产品需求 <span class="highlight">备忘录</span> (PRD) 概述了项目 Orion 的愿景、目标、功能需求和成功指标。这份 <span class="highlight">备忘录</span> 是产品团队的单一真实来源...',
                            type: 'DOCX',
                            match: 92,
                            pages: 18,
                            updated: '2024年4月28日'
                        },
                        {
                            id: 3,
                            path: '/Engineering/Design Docs/2024/',
                            title: '技术设计 <span class="highlight">备忘录</span> - Auth Service v2',
                            snippet: '这份技术设计 <span class="highlight">备忘录</span> 描述了 Auth Service v2 的架构和设计决策。<span class="highlight">备忘录</span> 涵盖范围、系统组件、API、数据模型和安全考虑...',
                            type: 'PDF',
                            match: 88,
                            pages: 31,
                            updated: '2024年4月10日'
                        },
                        {
                            id: 4,
                            path: '/HR/Policies/2024/',
                            title: '员工政策 <span class="highlight">备忘录</span> - 远程工作',
                            snippet: '这份 <span class="highlight">备忘录</span> 为远程工作安排提供了更新的政策和指南。它取代了之前关于远程工作的所有 <span class="highlight">备忘录</span>。这份 <span class="highlight">备忘录</span> 提供了...',
                            type: 'DOCX',
                            match: 85,
                            pages: 12,
                            updated: '2024年3月22日'
                        }
                    ]
                };
            },
            methods: {
                performSearch() {
                    console.log('搜索:', this.searchQuery);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
