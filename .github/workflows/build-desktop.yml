# Author: MorningSun
# CreatedDate: 2026/06/15
# Description: GitHub Actions 桌面端自动构建工作流，负责 Windows / macOS 的检查、打包与产物上传。

name: Build Desktop

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # 提前按 GitHub 即将切换的 Node 24 运行 JavaScript actions，
  # 避免等 runner 默认切换后再集中暴露兼容性问题。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows NSIS
            os: windows-latest
            build_command: npm run tauri:build:windows:nsis
            artifact_name: seekmind-windows-nsis
            artifact_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          - label: macOS Bundle
            os: macos-latest
            build_command: npm run tauri:build:macos:sidecar
            artifact_name: seekmind-macos-bundle
            artifact_path: dist-artifacts/seekmind-macos-bundle.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: parser/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare Tauri resource directories
        shell: bash
        run: |
          # 修复：GitHub fresh clone 不会保留空目录，先补齐 Tauri 资源目录，
          # 避免 build.rs 在校验 bundle resources 时因为目录缺失而失败。
          mkdir -p src-tauri/app-resources
          mkdir -p src-tauri/resources

      - name: Log build host
        shell: bash
        run: |
          echo "[SeekMind] github_ref=${GITHUB_REF}"
          echo "[SeekMind] runner_os=${RUNNER_OS}"
          echo "[SeekMind] node=$(node --version)"
          echo "[SeekMind] python=$(python --version 2>&1)"
          echo "[SeekMind] rustc=$(rustc --version)"
          echo "[SeekMind] cargo=$(cargo --version)"

      - name: Run frontend and Rust checks
        run: npm run check:all

      - name: Build desktop bundle
        run: ${{ matrix.build_command }}

      - name: Package macOS app for download
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          rm -f dist-artifacts/seekmind-macos-bundle.zip
          # 修复：upload-artifact 默认会忽略 .dylibs、.rels 等隐藏文件，
          # 直接上传 .app 目录会让签名后的 bundle 缺文件，下载后被 macOS 判定为“已损坏”。
          # 这里先用 ditto 生成完整 zip，再把 zip 作为单文件上传。
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/release/bundle/macos/SeekMind.app \
            dist-artifacts/seekmind-macos-bundle.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
